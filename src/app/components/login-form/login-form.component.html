<!-- Este contenedor incluye el formulario para crear un nuevo usuario -->
<!-- Componente de inicio de sesión -->
<div class="login-container">
    <!-- Header -->
    <header class="login-header">
      <img src="assets/images/login-logo.png" alt="Logo" class="login-logo" />
      <h1>Bienvenido</h1>
    </header>

  <!-- Contenido principal -->
  <div class="login-register-container">
    <!-- Formulario de inicio de sesión -->
    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      <div class="login-section">
        <h2>Iniciar sesión</h2>
        <div class="form-group">
          <label for="email">Correo:</label>
          <input id="email" formControlName="email" type="text" placeholder="Ingresa tu Correo" />
        </div>
        <div class="form-group">
            <label for="password">Clave:</label>
            <input id="password" formControlName="password" type="password" placeholder="Ingresa tu clave" />
        </div>
        <div class="button-container">
          <!-- Mensaje de error al registrar -->
          <button type="button" class="btn-login btn-limpiar" (click)="resetForm()">Limpiar</button>
          <!-- Mensaje de inicio de sesion -->
          <button type="submit" class="btn-login btn-iniciar" [disabled]="loginForm.invalid">Iniciar Sesión</button>
          <!-- Mensaje de error al iniciar sesión -->
        </div>
        <!-- <p *ngIf="loginError" class="error-message">{{ loginError }}</p>
        <p class="forgot-password" >Olvidé mi contraseña</p> -->
        <p *ngIf="submitted && loginError" class="forgot-password">{{ loginError }}</p>
      </div>
    </form>

    <!-- Sección de registro -->
    <div class="register-section">
      <h2>Nuevo usuario</h2>
      <p>Crea tu cuenta, se recomienda usar el correo del colegio como referencia.</p>
      <!-- <button type="button" class="btn-login btn-crear">Crear cuenta</button> -->
       <a routerLink="/login-registro" class="btn-link-crear">Crear cuenta</a>
      <br>
      <a routerLink="/opciones" class="login-link">Ir a Opciones</a>
      <br>
      <a routerLink="/inicio" class="login-link">Ir a Inicio</a>
    </div>

  </div>

  <!-- Footer -->
  <footer class="login-footer">
    <p>© 2025 Plataforma Educativa</p>
  </footer>

</div>
<!-- Fin del contenedor principal -->

<!-- Estilos para el componente de inicio de sesión -->
 <section class="bg-gray-50 dark:bg-gray-600">
  <div class="flex flex-col items-center justify-center px-6 py-8 mx-auto md:h-screen lg:py-0">
      <a href="#" class="flex items-center mb-6 text-2xl font-semibold text-gray-900 dark:text-white">
          <img class="w-32 h-auto min-w-[250px] min-h-[40px]" src="assets/images/login-logo.png" alt="logo">
          Eureka LMS
      </a>
      <div class="w-full bg-white rounded-lg shadow dark:border md:mt-0 sm:max-w-md xl:p-0 dark:bg-gray-800 dark:border-gray-700">
          <div class="p-6 space-y-4 md:space-y-3 sm:p-8">
              <h1 class="text-xl font-bold leading-tight tracking-tight text-gray-900 md:text-2xl dark:text-white">
                  Inicia sesión en tu cuenta
              </h1>
              <form class="space-y-4 md:space-y-6" action="#">
                  <div>
                      <label for="email" class="block mb-2 text-sm font-medium text-gray-900 dark:text-white">Correo</label>
                      <input type="email" name="email" id="email" class="bg-gray-50 border border-gray-300 text-gray-900 rounded-lg focus:ring-primary-600 focus:border-primary-600 block w-full p-2.5 dark:bg-gray-700 dark:border-gray-600 dark:placeholder-gray-400 dark:text-white dark:focus:ring-blue-500 dark:focus:border-blue-500" placeholder="name@company.com" required="">
                  </div>
                  <div>
                      <label for="password" class="block mb-2 text-sm font-medium text-gray-900 dark:text-white">Contraseña</label>
                      <input type="password" name="password" id="password" placeholder="••••••••" class="bg-gray-50 border border-gray-300 text-gray-900 rounded-lg focus:ring-primary-600 focus:border-primary-600 block w-full p-2.5 dark:bg-gray-700 dark:border-gray-600 dark:placeholder-gray-400 dark:text-white dark:focus:ring-blue-500 dark:focus:border-blue-500" required="">
                  </div>
                  <div class="flex items-center justify-between">
                      <div class="flex items-start">
                          <div class="flex items-center h-5">
                            <input id="remember" aria-describedby="remember" type="checkbox" class="w-4 h-4 border border-gray-300 rounded bg-gray-50 focus:ring-3 focus:ring-primary-300 dark:bg-gray-700 dark:border-gray-600 dark:focus:ring-primary-600 dark:ring-offset-gray-800" required="">
                          </div>
                          <div class="ml-3 text-sm">
                            <label for="remember" class="text-gray-500 dark:text-gray-300">Recordar</label>
                          </div>
                      </div>
                      <a href="#" class="text-sm font-medium text-primary-600 hover:underline dark:text-primary-500">Recuperar contraseña?</a>
                  </div>
                  <button type="submit" class="w-full text-white bg-primary-600 hover:bg-primary-700 focus:ring-4 focus:outline-none focus:ring-primary-300 font-medium rounded-lg text-sm px-5 py-2.5 text-center dark:bg-primary-600 dark:hover:bg-primary-700 dark:focus:ring-primary-800">Iniciar sesión</button>
                  <p class="text-sm font-light text-gray-500 dark:text-gray-400">
                      Crear nueva cuenta  <a href="#" class="font-medium text-primary-600 hover:underline dark:text-primary-500">Registrarse</a>
                  </p>
              </form>
          </div>
      </div>
  </div>
</section>
